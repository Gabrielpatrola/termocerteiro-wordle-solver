<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="favicon-title favicon-desc">
  <title id="favicon-title">TermoCerteiro favicon</title>
  <desc id="favicon-desc">A compact word-grid icon with gray, yellow, and green tiles plus a white check mark.</desc>
  <defs>
    <linearGradient id="background-gradient" x1="10" x2="54" y1="6" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="green-tile-gradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="yellow-tile-gradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="tile-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#020617" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="56" height="56" x="4" y="4" fill="url(#background-gradient)" rx="18" />
  <rect width="56" height="56" x="4" y="4" fill="none" stroke="#334155" stroke-width="2" rx="18" />

  <g filter="url(#tile-shadow)">
    <rect width="14" height="14" x="10" y="15" fill="#1f2937" stroke="#475569" stroke-width="1.5" rx="4" />
    <rect width="14" height="14" x="25" y="15" fill="url(#yellow-tile-gradient)" stroke="#fcd34d" stroke-width="1.5" rx="4" />
    <rect width="14" height="14" x="40" y="15" fill="#1f2937" stroke="#475569" stroke-width="1.5" rx="4" />

    <rect width="14" height="14" x="10" y="34" fill="#1f2937" stroke="#475569" stroke-width="1.5" rx="4" />
    <rect width="14" height="14" x="25" y="34" fill="url(#green-tile-gradient)" stroke="#6ee7b7" stroke-width="1.5" rx="4" />
    <rect width="14" height="14" x="40" y="34" fill="#1f2937" stroke="#475569" stroke-width="1.5" rx="4" />
  </g>

  <path
    fill="none"
    stroke="#f8fafc"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="4.5"
    d="M28.5 40.75 31.5 43.75 36.75 38.5"
  />
</svg>
