<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">TermoCerteiro logo</title>
  <desc id="logo-desc">Logotipo do TermoCerteiro com símbolo de grade e check ao lado do nome.</desc>
  <defs>
    <linearGradient id="logo-bg" x1="13" y1="8" x2="58" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="logo-green" x1="22" y1="19" x2="54" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="logo-yellow" x1="30" y1="15" x2="41" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde047" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="logo-wordmark" x1="350" y1="40" x2="560" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#14b8a6" />
    </linearGradient>
  </defs>

  <g transform="translate(8 36)">
    <rect x="4" y="4" width="64" height="64" rx="22" fill="url(#logo-bg)" />
    <rect x="4" y="4" width="64" height="64" rx="22" fill="none" stroke="#334155" stroke-width="1.5" />
    <rect x="12" y="12" width="48" height="48" rx="16" fill="none" stroke="rgba(255,255,255,0.07)" />

    <rect x="15" y="16" width="12" height="12" rx="4" fill="#1f2937" stroke="#475569" stroke-width="1.2" />
    <rect x="30" y="16" width="12" height="12" rx="4" fill="url(#logo-yellow)" stroke="#fcd34d" stroke-width="1.2" />
    <rect x="45" y="16" width="12" height="12" rx="4" fill="#1f2937" stroke="#475569" stroke-width="1.2" />
    <rect x="15" y="31" width="12" height="12" rx="4" fill="#1f2937" stroke="#475569" stroke-width="1.2" />
    <rect x="30" y="31" width="12" height="12" rx="4" fill="url(#logo-green)" stroke="#99f6e4" stroke-width="1.2" />
    <rect x="45" y="31" width="12" height="12" rx="4" fill="#1f2937" stroke="#475569" stroke-width="1.2" />

    <path
      d="M20 46.5 28.5 55 50.5 33"
      fill="none"
      stroke="url(#logo-green)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="6"
    />
    <path
      d="M20 46.5 28.5 55 50.5 33"
      fill="none"
      stroke="#ecfeff"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2.6"
    />
  </g>

  <g transform="translate(102 32)">
    <text x="0" y="76" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800">
      Termo
    </text>
    <text
      x="206"
      y="76"
      fill="url(#logo-wordmark)"
      font-family="Arial, Helvetica, sans-serif"
      font-size="74"
      font-weight="800"
    >
      Certeiro
    </text>
    <text
      x="2"
      y="112"
      fill="#94a3b8"
      font-family="Arial, Helvetica, sans-serif"
      font-size="19"
      font-weight="700"
      letter-spacing="6"
    >
      SOLVER PARA TERMOO E WORDLE
    </text>
  </g>
</svg>
